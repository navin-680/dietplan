<title>My Diet Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gd: #0f3d2e; --gm: #1a6b4a; --gb: #2ecc8a; --gp: #d4f5e7;
  --am: #f5a623; --ap: #fff4dc;
  --co: #e8604c; --cp: #fdecea;
  --bl: #2563eb; --bp: #eff6ff;
  --pu: #7c3aed; --pp: #f3f0ff;
  --bg: #f4f6f4; --card: #fff; --text: #111; --muted: #6b7b72; --border: #e0ece6;
  --r: 18px; --rsm: 11px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.header{background:var(--gd);color:#fff;padding:env(safe-area-inset-top,44px) 20px 0;flex-shrink:0;}
.h-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;}
.h-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-.3px;}
.h-sub{font-size:11px;opacity:.55;margin-top:1px;}
.badge-g{background:var(--gb);color:var(--gd);font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;font-family:'Syne',sans-serif;white-space:nowrap;}

.macro-strip{background:var(--gm);display:grid;grid-template-columns:repeat(4,1fr);padding:10px 20px;gap:6px;flex-shrink:0;}
.mc{text-align:center;}
.mc-v{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;}
.mc-l{font-size:9px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.05em;margin-top:1px;}

.whey-bar{background:#2d1060;padding:8px 20px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.whey-pill{background:#a78bfa;color:#1e0a3c;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.whey-bar span{font-size:11px;color:rgba(255,255,255,.8);}

.day-nav-wrap{padding:12px 20px 0;flex-shrink:0;}
.day-nav{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:1px;}
.day-nav::-webkit-scrollbar{display:none;}
.db{flex-shrink:0;padding:6px 13px;border:1.5px solid var(--border);border-radius:30px;background:var(--card);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;}
.db.active{background:var(--gd);color:#fff;border-color:var(--gd);}
.db.veg.active{background:var(--gm);border-color:var(--gm);}

.veg-pill{display:none;align-items:center;gap:5px;margin:9px 20px 0;background:#e8f7ef;border:1px solid #a8dfc0;border-radius:30px;padding:5px 13px;font-size:11px;color:var(--gm);font-weight:500;width:fit-content;}
.veg-pill.show{display:flex;}

.pb-wrap{margin:10px 20px 0;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 14px;flex-shrink:0;}
.pb-top{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;}
.pb-track{background:var(--border);border-radius:4px;height:6px;}
.pb-fill{height:6px;border-radius:4px;background:var(--gb);transition:width .5s cubic-bezier(.4,0,.2,1);}

.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 20px 120px;}

/* ── Timeline cards ── */
.t-row{display:grid;grid-template-columns:52px 1fr;gap:0;position:relative;}
.t-row:not(:last-child)::after{content:'';position:absolute;left:26px;top:36px;bottom:0;width:1.5px;background:var(--border);z-index:0;}
.t-left{display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:5px;}
.t-left span{font-size:9px;color:var(--muted);text-align:center;line-height:1.3;white-space:pre-line;}
.t-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);position:relative;z-index:1;flex-shrink:0;}
.t-card{margin:7px 0 7px 11px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--card);overflow:hidden;cursor:pointer;transition:transform .13s,box-shadow .13s;}
.t-card:active{transform:scale(.98);}
.t-card.drink{border-color:#a8dfc0;background:#f0fbf5;}
.t-card.snack{border-color:#f5d9a0;background:var(--ap);}
.t-card.whey-card{border-color:#c4b5fd;background:var(--pp);}

.card-img{width:100%;height:140px;object-fit:cover;display:block;background:#e8ede8;}
.card-img-placeholder{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#e8f5ee,#d0ece0);}
.card-body{padding:12px 14px 13px;}
.slot-tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.slot-tag.drink{color:var(--gm);}
.slot-tag.main{color:var(--bl);}
.slot-tag.snack{color:#b07c10;}
.slot-tag.whey{color:var(--pu);}
.meal-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:7px;line-height:1.3;}
.meal-items{list-style:none;font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:9px;}
.meal-items li::before{content:"· ";}
.badges{display:flex;flex-wrap:wrap;gap:5px;}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;}
.b-p{background:var(--bp);color:var(--bl);}
.b-k{background:var(--cp);color:var(--co);}
.b-f{background:#e8f7ef;color:var(--gm);}
.b-w{background:var(--pp);color:var(--pu);}
.b-s{background:var(--ap);color:#8c6010;}
.why{font-size:11px;color:var(--gm);margin-top:8px;font-style:italic;border-top:1px solid rgba(0,0,0,.06);padding-top:7px;}
.tap-hint{font-size:10px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:4px;opacity:.7;}

/* ── Modal / Bottom Sheet ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;z-index:501;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-sheet.open{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;}
.modal-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding-bottom:env(safe-area-inset-bottom,20px);}
.modal-img{width:100%;height:220px;object-fit:cover;display:block;background:#e8ede8;}
.modal-img-placeholder{width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:72px;background:linear-gradient(135deg,#e8f5ee,#c5e8d5);}
.modal-body{padding:20px 20px 12px;}
.modal-slot-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:12px;line-height:1.25;}
.modal-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.section-head{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:1.5px solid var(--border);}
.ingr-list{list-style:none;margin-bottom:18px;}
.ingr-list li{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);}
.ingr-list li:last-child{border-bottom:none;}
.ingr-dot{width:7px;height:7px;border-radius:50%;background:var(--gb);flex-shrink:0;margin-top:5px;}
.steps-list{list-style:none;margin-bottom:20px;}
.step-item{display:flex;gap:13px;padding:10px 0;border-bottom:1px solid var(--border);}
.step-item:last-child{border-bottom:none;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--gd);color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13px;color:var(--text);line-height:1.6;}
.step-time{font-size:11px;color:var(--muted);margin-top:3px;}
.close-btn{margin:0 20px 16px;padding:14px;background:var(--gd);color:#fff;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:calc(100% - 40px);letter-spacing:.02em;}

.install-bar{position:fixed;bottom:0;left:0;right:0;background:var(--gd);color:#fff;padding:10px 20px calc(env(safe-area-inset-bottom,0px) + 10px);font-size:11px;text-align:center;z-index:300;display:flex;align-items:center;justify-content:center;gap:8px;}
.install-bar button{background:var(--gb);color:var(--gd);border:none;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;}
</style>
</head>

const WHEY_PROT=24, WHEY_KCAL=110, GOAL=190;

function makeImg(key, cls, h) {
  if (!key || !IMG[key]) return `<div class="${cls}" style="height:${h}px;font-size:${h>160?72:44}px">🍽</div>`;
  return `<img src="${IMG[key]}" class="${cls}" style="height:${h}px" onerror="this.style.display='none'" loading="lazy" alt="">`;
}

function openModal(slotData) {
  const {type, icon, name, imgKey, items, steps, prot, kcal, why, slotLabel, dotColor} = slotData;
  let badgesHtml = '';
  if (type==='drink') badgesHtml=`<span class="badge b-f">🌿 Fat burn</span>`;
  else if (type==='whey') badgesHtml=`<span class="badge b-w">💊 ${prot}g protein</span><span class="badge b-k">${kcal} kcal</span>`;
  else badgesHtml=`<span class="badge b-p">${prot}g protein</span><span class="badge b-k">${kcal} kcal</span>`;

  const stepsHtml = (steps && steps.length) ? `
    <div class="section-head">👨‍🍳 Cooking steps</div>
    <ol class="steps-list">${steps.map((st,i)=>`
      <li class="step-item">
        <div class="step-num">${i+1}</div>
        <div><div class="step-text">${st.s}</div>${st.t?`<div class="step-time">⏱ ${st.t}</div>`:''}</div>
      </li>`).join('')}
    </ol>` : '';

  const whyHtml = why ? `<div class="why" style="margin-bottom:16px">💡 ${why}</div>` : '';

  document.getElementById('modalContent').innerHTML = `
    ${makeImg(imgKey, 'modal-img', 220)}
    <div class="modal-body">
      <div class="modal-slot-tag" style="color:${dotColor}">${slotLabel}</div>
      <div class="modal-title">${icon} ${name}</div>
      <div class="modal-badges">${badgesHtml}</div>
      ${whyHtml}
      <div class="section-head">🥦 Ingredients</div>
      <ul class="ingr-list">${items.map(it=>`<li><div class="ingr-dot"></div>${it}</li>`).join('')}</ul>
      ${stepsHtml}
    </div>
    <button class="close-btn" onclick="closeModal()">✓ Got it</button>
  `;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modalSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modalSheet').classList.remove('open');
  document.body.style.overflow = '';
}

let startY = 0;
const sheet = document.getElementById('modalSheet');
sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
sheet.addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - startY;
  if (dy > 60) closeModal();
});

function renderDay(d) {
  document.querySelectorAll('.db').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.db[data-d="${d}"]`).classList.add('active');
  const day = meals[d];
  document.getElementById('vegPill').classList.toggle('show', !!day.veg);
  const drink = morningDrinks[d];
  const snack = eveningSnacks[d];
  const totalProt = day.bf.prot + WHEY_PROT + day.lu.prot + snack.prot + day.di.prot;
  const totalKcal = day.bf.kcal + WHEY_KCAL + day.lu.kcal + snack.kcal + day.di.kcal + 10;
  document.getElementById('cv').textContent = totalKcal.toLocaleString();
  document.getElementById('pv').textContent = totalProt + 'g';
  const pct = Math.min(100, Math.round(totalProt/GOAL*100));
  document.getElementById('pb-fill').style.width = pct+'%';
  document.getElementById('pb-fill').style.background = day.veg ? '#2ecc8a' : '#2563eb';
  document.getElementById('pb-txt').textContent = totalProt+'g / '+GOAL+'g ('+pct+'%)';

  const slotConfigs = [
    { time:"6:00\nAM", type:"drink", dot:"#1a6b4a", slotLabel:"🌿 Morning Drink", icon:"🍋",
      imgKey: drink.imgKey, name: drink.name, items: drink.items, steps: drink.steps, why: drink.why },
    { time:"7–8\nAM", type:"main", dot:"#2563eb", slotLabel:"🍽 Breakfast", ...day.bf },
    { time:"Post\nWO", type:"whey", dot:"#7c3aed", slotLabel:"💪 Whey Shake", icon:"🥛",
      imgKey:"whey", name:"Whey protein shake", prot:WHEY_PROT, kcal:WHEY_KCAL,
      items:["1 scoop whey protein (24g protein)","Mix with 250ml cold water or milk","Drink within 30 min after training"],
      steps:[{s:"Add 250ml cold water or milk to shaker"},{s:"Add 1 scoop whey protein powder"},{s:"Close lid tightly, shake vigorously",t:"30 sec"},{s:"Drink within 30 min post-workout"}]},
    { time:"1–2\nPM", type:"main", dot:"#2563eb", slotLabel:"🍽 Lunch", ...day.lu },
    { time:"5–6\nPM", type:"snack", dot:"#f5a623", slotLabel:"⚡ Evening Snack", icon:"🥜",
      imgKey: snack.imgKey, name: snack.name, items: snack.items, steps: snack.steps, prot: snack.prot, kcal: snack.kcal, why: snack.why },
    { time:"8–9\nPM", type:"main", dot:"#2563eb", slotLabel:"🍽 Dinner", ...day.di },
  ];

  const tl = document.getElementById('timeline');
  tl.innerHTML = slotConfigs.map((s, i) => {
    let badges='';
    if(s.type==='drink') badges=`<span class="badge b-f">Fat burn · Belly</span>`;
    else if(s.type==='whey') badges=`<span class="badge b-w">💊 ${s.prot}g protein</span><span class="badge b-k">${s.kcal} kcal</span>`;
    else badges=`<span class="badge b-p">${s.prot}g protein</span><span class="badge b-k">${s.kcal} kcal</span>`;
    const why = s.why ? `<div class="why">💡 ${s.why}</div>` : '';
    const cardClass = s.type==='drink' ? 'drink' : s.type==='snack' ? 'snack' : s.type==='whey' ? 'whey-card' : '';
    const tagClass = s.type==='whey' ? 'whey' : s.type==='main' ? 'main' : s.type;
    const slotData = JSON.stringify(s).replace(/'/g,"&#39;");
    return `
    <div class="t-row">
      <div class="t-left">
        <span>${s.time}</span>
        <div class="t-dot" style="background:${s.dot}"></div>
      </div>
      <div class="t-card ${cardClass}" onclick='openModal(${slotData})'>
        ${makeImg(s.imgKey, 'card-img', 140)}
        <div class="card-body">
          <div class="slot-tag ${tagClass}">${s.slotLabel}</div>
          <div class="meal-name">${s.icon} ${s.name}</div>
          <ul class="meal-items">${s.items.slice(0,3).map(it=>`<li>${it}</li>`).join('')}${s.items.length>3?`<li>+${s.items.length-3} more...</li>`:''}</ul>
          <div class="badges">${badges}</div>
          ${why}
          <div class="tap-hint">👆 Tap to see cooking steps</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

const nav = document.getElementById('dayNav');
Object.entries(meals).forEach(([d,day]) => {
  const btn = document.createElement('button');
  btn.className='db'+(day.veg?' veg':'');
  btn.dataset.d=d;
  btn.textContent=day.name.slice(0,3)+(day.veg?' 🌿':'');
  btn.onclick=()=>renderDay(+d);
  nav.appendChild(btn);
});

const today=new Date().getDay();
const mapped=today===0?6:today-1;
renderDay(mapped);
setTimeout(()=>{
  const a=document.querySelector('.db.active');
  if(a) a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
},100);
</script>
